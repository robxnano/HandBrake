name: handbrake-gstreamer-plugin
version: '1.10.0'
summary: GStreamer preview support for HandBrake
description: |
  This plugin provides the required libraries for video
  and audio previews in HandBrake.
license: GPL-2.0-or-later
grade: stable
confinement: strict
base: core24
compression: xz
platforms:
  amd64:
  arm64:

slots:
  gstreamer-plugin-2404:
    interface: content
    content: gstreamer-plugin-2404
    read:
      - $SNAP/usr

plugs:
  gnome-46-2404:
    interface: content
    target: $SNAP/gnome-platform
    default-provider: gnome-46-2404
  gpu-2404:
    interface: content
    target: $SNAP/gpu-2404
    default-provider: mesa-2404

parts:
  gst-libav:
    plugin: nil
    stage-packages:
      - gstreamer1.0-libav
    prime:
      - usr/lib/*/gstreamer-1.0/libgstlibav.so
      - usr/lib/*/lib*.so.*
      - -usr/lib/*/libcairo-gobject.so.*
      - -usr/lib/*/libcairo.so.*
      - -usr/lib/*/libdrm_intel.so.*
      - -usr/lib/*/libfftw3_omp.so.*
      - -usr/lib/*/libfftw3_threads.so.*
      - -usr/lib/*/libflite_cmu_grapheme_lang.so.*
      - -usr/lib/*/libflite_cmu_grapheme_lex.so.*
      - -usr/lib/*/libflite_cmu_indic_lang.so.*
      - -usr/lib/*/libflite_cmu_indic_lex.so.*
      - -usr/lib/*/libflite_cmu_time_awb.so.*
      - -usr/lib/*/libgdk_pixbuf-2.0.so.*
      - -usr/lib/*/libharfbuzz.so.*
      - -usr/lib/*/libicui18n.so.*
      - -usr/lib/*/libicutest.so.*
      - -usr/lib/*/libicutu.so.*
      - -usr/lib/*/libpango-1.0.so.*
      - -usr/lib/*/libpangocairo-1.0.so.*
      - -usr/lib/*/libpangoft2-1.0.so.*
      - -usr/lib/*/libpixman-1.so.*
      - -usr/lib/*/librsvg-2.so.*
      - -usr/lib/*/libsphinxad.so.*
      - -usr/lib/*/libwayland-client.so.*
  rust-toolchain:
    plugin: nil
    override-build: |
      rustup default stable
      cargo install cargo-c
    build-packages:
      - libssl-dev
      - pkgconf
      - rustup
  gst-dav1d:
    after: [rust-toolchain]
    source-type: tar
    source: https://gitlab.freedesktop.org/gstreamer/gst-plugins-rs/-/archive/gstreamer-1.26.5/gst-plugins-rs-gstreamer-1.26.5.tar.bz2
    source-checksum: sha256/19182e58c29a9c777f4d8325253560c6481a0c9d75819e81870c711916740b93
    plugin: meson
    meson-parameters:
      - -Dauto_features=disabled
      - -Ddav1d=enabled
      - -Dprefix=/usr
    build-packages:
      - git
      - rustup
    build-snaps:
      - gnome-46-2404-sdk/latest/candidate
    build-environment:
      - PKG_CONFIG_PATH: /snap/gnome-46-2404-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}
      - LD_LIBRARY_PATH: /snap/gnome-46-2404-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
      - PATH: $HOME/.cargo/bin:/snap/gnome-46-2404-sdk/current/usr/bin${PATH:+:$PATH}
      - XDG_DATA_DIRS: $CRAFT_STAGE/usr/share:/snap/gnome-46-2404-sdk/current/usr/share:/usr/share${XDG_DATA_DIRS:+:$XDG_DATA_DIRS}
      - GETTEXTDATADIRS: /snap/gnome-46-2404-sdk/current/usr/share/gettext-current${GETTEXTDATADIRS:+:$GETTEXTDATADIRS}
      - GDK_PIXBUF_MODULE_FILE: /snap/gnome-46-2404-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/gdk-pixbuf-current/loaders.cache
      - ACLOCAL_PATH: /snap/gnome-46-2404-sdk/current/usr/share/aclocal${ACLOCAL_PATH:+:$ACLOCAL_PATH}
      - PYTHONPATH: /snap/gnome-46-2404-sdk/current/usr/lib/python3.10:/snap/gnome-46-2404-sdk/current/usr/lib/python3/dist-packages:/snap/gnome-46-2404-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/gobject-introspection${PYTHONPATH:+:$PYTHONPATH}
      - GI_TYPELIB_PATH: /snap/gnome-46-2404-sdk/current/usr/lib/girepository-1.0:/snap/gnome-46-2404-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/girepository-1.0${GI_TYPELIB_PATH:+:$GI_TYPELIB_PATH}
      - RUSTFLAGS: -C strip=debuginfo
    prime:
      - -usr/lib/*/pkgconfig

  # Find files provided by the base and platform snap and ensure they aren't
  # duplicated in this snap
  cleanup:
    after: [gst-libav]
    plugin: nil
    build-snaps: [core24, mesa-2404, gnome-46-2404]
    override-prime: |
      set -eux
      for snap in "core24" "mesa-2404" "gnome-46-2404"; do
        cd "/snap/$snap/current" && find . -type f,l -name *.so.* -exec rm -f "$CRAFT_PRIME/{}" \;
      done
